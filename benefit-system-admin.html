            <div class="fg"><label>Benefit 이벤트명</label><input type="text" placeholder="이벤트명 검색" style="width:240px"></div>
            <div class="fg"><label>상태</label><select style="width:130px"><option>전체</option><option>대기</option><option>진행 중</option><option>종료</option></select></div>
            <div class="fg"><label>활성화 여부</label><select style="width:120px"><option>전체</option><option>On</option><option>Off</option></select></div>
            <div class="fg"><label>견적 종류</label><select style="width:140px"><option>전체</option><option>일반견적</option><option>스마트견적</option></select></div>
            <div class="fg" style="min-width:350px;">
              <label>서비스</label>
              <div class="triple-select" style="width:350px;">
                <select>
                  <option selected>이사</option>
                  <option>청소</option>
                  <option>설치/수리</option>
                </select>
                <select>
                  <option selected>가정이사</option>
                  <option>원룸/소형이사</option>
                  <option>사무실이사</option>
                </select>
                <select>
                  <option selected>국내 이사</option>
                  <option>가정이사(투룸 이상)</option>
                  <option>원룸/소형 이사</option>
                </select>
              </div>
            </div>
          </div>
          <div class="search-row">
            <div class="btn-group"><button class="btn btn-reset">초기화</button><button class="btn btn-search">검색</button></div>
          </div>
        </div>
        <div class="tbl-ctrl">
          <div class="result-count">총 <strong>38개</strong> Benefit 이벤트</div>
          <div class="tbl-actions">
            <button class="btn-primary" onclick="showBenefitRegister()">+ Benefit 등록</button>
          </div>
        </div>
        <div class="tbl-wrap">
          <div class="pg-row"><span>페이지당 크기</span><select><option>10</option><option>20</option><option>50</option></select><button class="pg-btn">‹</button><button class="pg-btn">›</button></div>
          <table>
            <thead>
              <tr>
                <th style="width:56px">No.</th>
                <th style="width:240px">Benefit 이벤트명</th>
                <th style="width:120px">견적 종류</th>
                <th style="width:180px">카테고리 및 서비스</th>
                <th style="width:136px">시작일자</th>
                <th style="width:136px">종료일자</th>
                <th style="width:92px">상태</th>
                <th style="width:108px">활성화</th>
                <th style="width:132px">최근 수정일자</th>
                <th style="width:104px">최근 등록자</th>
                <th style="width:140px">비고</th>
                <th style="width:80px; text-align:center">관리</th>
              </tr>
            </thead>
            <tbody>${benefitTableRows()}</tbody>
          </table>
          <div class="pg-row bottom"><span>페이지당 크기</span><select><option>10</option><option>20</option><option>50</option></select><button class="pg-btn">‹</button><button class="pg-btn">›</button></div>
        </div>
      `;
    }

    let benefitConditionMode = 'csv';
    let currentBenefitRegisterIsEdit = false;
    let serviceModalOpen = false;
    let selectedRegionCity = '전체';
    let selectedRegionDistrict = '전체';
    let selectedRegionDong = '전체';
    let appliedRegionItems = ['전체'];
    let activeServiceCategoryId = 'move-clean';
    let activeServiceGroupId = 'move';
    let selectedServiceItems = [{ key: 'service:영어 과외', label: '영어 과외', level: 'service' }];
    let appliedServiceItems = [{ key: 'service:영어 과외', label: '영어 과외', level: 'service' }];

    function isSelectedItem(key) {
      return selectedServiceItems.some((item) => item.key === key);
    }

    function buildCategoryItem(category) {
      return { key: `category:${category.id}`, label: category.label, level: 'category1' };
    }

    function buildGroupItem(group) {
      return { key: `group:${group.id}`, label: group.label, level: 'category2' };
    }

    function buildServiceItem(serviceName) {
      return { key: `service:${serviceName}`, label: serviceName, level: 'service' };
    }

    function getActiveServiceCategory() {
      return serviceModalCategories.find((category) => category.id === activeServiceCategoryId) || serviceModalCategories[0];
    }

    function getRegionDistricts(city) {
      if (city === '전체') return ['전체'];
      return ['전체', ...Object.keys(regionOptions[city] || {})];
    }

    function getRegionDongs(city, district) {
      if (city === '전체' || district === '전체') return ['전체'];
      return ['전체', ...(regionOptions[city]?.[district] || [])];
    }

    function syncRegionSelection() {
      if (selectedRegionCity === '전체') {
        selectedRegionDistrict = '전체';
        selectedRegionDong = '전체';
        return;
      }
      const districts = getRegionDistricts(selectedRegionCity);
      if (!districts.includes(selectedRegionDistrict)) {
        selectedRegionDistrict = districts[0];
      }
      if (selectedRegionDistrict === '전체') {
        selectedRegionDong = '전체';
        return;
      }
      const dongs = getRegionDongs(selectedRegionCity, selectedRegionDistrict);
      if (!dongs.includes(selectedRegionDong)) {
        selectedRegionDong = dongs[0];
      }
    }

    function formatRegionLabel(city, district, dong) {
      if (city === '전체') return '전체';
      if (district === '전체') return `${city} 전체`;
      if (dong === '전체') return `${city} ${district} 전체`;
      return `${city} ${district} ${dong}`;
    }

    function getActiveServiceGroup() {
      const category = getActiveServiceCategory();
      return category.groups.find((group) => group.id === activeServiceGroupId) || category.groups[0];
    }

    function renderServiceModal() {
      if (!serviceModalOpen) return '';

      const activeCategory = getActiveServiceCategory();
      const activeGroup = getActiveServiceGroup();

      return `
        <div class="service-modal" onclick="closeServiceModal()">
          <div class="service-modal-panel" onclick="event.stopPropagation()">
            <div class="service-modal-head">
              <div class="service-modal-title">서비스 추가</div>
              <button type="button" class="service-modal-close" onclick="closeServiceModal()">×</button>
            </div>
            <div class="service-modal-body">
              <div class="service-modal-main">
                <div class="service-search">
                  <div class="service-search-box">
                    <span>⌕</span>
                    <input type="text" placeholder="띄어쓰기 동일하게 입력해야 검색됩니다">
                  </div>
                </div>
                <div class="service-top-cats">
                  ${serviceModalCategories.map((category) => `
                      <button type="button" class="service-top-cat ${category.id === activeCategory.id ? 'active' : ''}" onclick="setServiceCategory('${category.id}')">
                      <span class="service-top-cat-icon">
                        ${category.icon}
                        <span class="service-level-toggle service-radio-toggle service-top-cat-toggle ${isSelectedItem(buildCategoryItem(category).key) ? 'checked' : ''}" onclick="event.stopPropagation(); toggleCategorySelection('${category.id}')"></span>
                      </span>
                      <span class="service-top-cat-label">${category.label}</span>
                    </button>
                  `).join('')}
                </div>
                <div class="service-picker">
                  <div class="service-subcats">
                    ${activeCategory.groups.map((group) => `
                      <button type="button" class="service-subcat ${group.id === activeGroup.id ? 'active' : ''}" onclick="setServiceGroup('${group.id}')">
                        <span>${group.label}</span>
                        <span class="service-level-toggle ${isSelectedItem(buildGroupItem(group).key) ? 'checked' : ''}" onclick="event.stopPropagation(); toggleGroupSelection('${group.id}')"></span>
                      </button>
                    `).join('')}
                  </div>
                  <div class="service-list-shell">
                    <div class="service-list-head">
                      <div>${activeCategory.label.replace('/청소', '').replace('이사/청소', '이사')}</div>
                      <div>${activeGroup.label}</div>
                    </div>
                    <div class="service-list">
                      ${activeGroup.services.map((serviceName) => `
                        <div class="service-row">
                          <span>${serviceName}</span>
                          <button type="button" class="service-check ${isSelectedItem(buildServiceItem(serviceName).key) ? 'checked' : ''}" onclick="toggleServiceSelection('${serviceName}')"></button>
                        </div>
                      `).join('')}
                    </div>
                  </div>
                </div>
              </div>
              <div class="service-modal-side">
                <div class="service-selected-head">
                  <span>선택한 서비스</span>
                  <span>${selectedServiceItems.length}/20</span>
                </div>
                <div class="service-selected-list">
                  ${selectedServiceItems.map((item) => `
                    <div class="service-selected-item">
                      <span>${item.label}</span>
                      <button type="button" class="service-remove" onclick="removeSelectedItem('${item.key}')">×</button>
                    </div>
                  `).join('')}
                </div>
                <div class="service-modal-footer">
                  <button type="button" class="service-submit ${selectedServiceItems.length ? 'active' : ''}" ${selectedServiceItems.length ? 'onclick="applySelectedServices()"' : ''}>등록하기</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function benefitRegisterView(isEdit = false) {
      return `
        <div class="breadcrumb">
          <a onclick="showPromotionView()">포스 홈</a><span class="breadcrumb-sep">/</span>
          <a onclick="showPromotionView()">프로모션 관리</a><span class="breadcrumb-sep">/</span>
          <a onclick="showBenefitDashboard()">Benefit 관리</a><span class="breadcrumb-sep">/</span>
          <a onclick="showBenefitDashboard()">Benefit 관리 대시보드</a><span class="breadcrumb-sep">/</span>
          Benefit ${isEdit ? '수정' : '등록'}
        </div>
        <div class="subhead">
          <div>
            <h1>Benefit event ${isEdit ? '수정' : '등록'}</h1>
          </div>
        </div>
        <div class="form-shell">
          <div>
            <div class="form-card">
              <div class="form-card-title">이벤트 기본 정보</div>
              <div class="ff-grid">
                <div class="ff">
                  <label>Benefit 이벤트명 <span class="req">*</span></label>
                  <input type="text" ${isEdit ? 'value="가전설치 신규 고수 초기 견적 유도"' : 'placeholder="이벤트명을 입력해 주세요"'}>
                  <div class="hint">사용자에게 노출 안됩니다</div>
                </div>
              </div>
            </div>

            <div class="form-card">
              <div class="form-card-title">Benefit 적용 조건</div>
              <div class="radio-card-row">
                <button type="button" class="radio-card ${benefitConditionMode === 'csv' ? 'active' : ''}" onclick="setBenefitConditionMode('csv', ${isEdit})">
                  <span class="radio-dot"></span>
                  <span>1. 특정 고수 업로드</span>
                </button>
                <button type="button" class="radio-card ${benefitConditionMode === 'filter' ? 'active' : ''}" onclick="setBenefitConditionMode('filter', ${isEdit})">
                  <span class="radio-dot"></span>
                  <span>2. 조건선택</span>
                </button>
              </div>
              ${benefitConditionMode === 'filter' ? `
                <div class="hint" style="margin-bottom:18px;">서비스가 진행된 이후에는 수정이 불가합니다</div>
              ` : ''}
              ${benefitConditionMode === 'csv' ? `
                <div class="ff-grid">
                  <div class="ff full">
                    <label>CSV 업로드 <span class="req">*</span></label>
                    <div class="upload-box">
                      <div class="upload-actions">
                        <button type="button" class="upload-btn">파일 선택</button>
                        <button type="button" class="upload-btn">CSV 템플릿</button>
                      </div>
                      <div class="upload-meta">
                        <div>파일 형식 : CSV, XLSX</div>
                        <div>파일 용량 : 최대 10MB</div>
                        <div>CSV를 재업로드하면 기존에 등록된 고수는 유지되고, 새로운 고수만 추가됩니다</div>
                      </div>
                    </div>
                  </div>
                </div>
              ` : `
                <div class="ff-grid">
                  <div class="ff">
                    <label>지역 <span class="req">*</span></label>
                    <div class="area-select-wrap">
                      <div class="triple-select">
                        <select onchange="setRegionCity(this.value)">
                          ${['전체', ...Object.keys(regionOptions)].map((city) => `
                            <option value="${city}" ${city === selectedRegionCity ? 'selected' : ''}>${city}</option>
                          `).join('')}
                        </select>
                        <select onchange="setRegionDistrict(this.value)">
                          ${getRegionDistricts(selectedRegionCity).map((district) => `
                            <option value="${district}" ${district === selectedRegionDistrict ? 'selected' : ''}>${district}</option>
                          `).join('')}
                        </select>
                        <select onchange="setRegionDong(this.value)">
                          ${getRegionDongs(selectedRegionCity, selectedRegionDistrict).map((dong) => `
                            <option value="${dong}" ${dong === selectedRegionDong ? 'selected' : ''}>${dong}</option>
                          `).join('')}
                        </select>
                      </div>
                      <button type="button" class="area-add-btn" onclick="addSelectedRegion()">지역 추가</button>
                      ${appliedRegionItems.length ? `
                        <div class="selected-service-stack">
                          ${appliedRegionItems.map((areaLabel) => `
                            <div class="selected-service-card">
                              <span>${areaLabel}</span>
                              <button type="button" class="selected-service-remove" onclick="removeAppliedRegion('${areaLabel}')">×</button>
                            </div>
                          `).join('')}
                        </div>
                      ` : `
                        <div class="selected-service-empty">아직 추가된 지역이 없습니다.</div>
                      `}
                    </div>
                  </div>
                  <div class="ff">
                    <label>서비스</label>
                    <button type="button" class="service-trigger" onclick="openServiceModal()">서비스 등록하기</button>
                    ${appliedServiceItems.length ? `
                      <div class="selected-service-stack">
                        ${appliedServiceItems.map((item) => `
                          <div class="selected-service-card">
                            <span>${item.label}</span>
                            <button type="button" class="selected-service-remove" onclick="removeAppliedService('${item.key}')">×</button>
                          </div>
                        `).join('')}
                      </div>
                    ` : `
                      <div class="selected-service-empty">아직 추가된 서비스가 없습니다.</div>
                    `}
                  </div>
                  <div class="ff">
                    <label>견적 유형</label>
                    <select>
                      <option>전체</option>
                      <option selected>스마트견적</option>
                      <option>일반견적</option>
                    </select>
                  </div>
                </div>
              `}
            </div>

            <div class="form-card">
              <div class="form-card-title">노출 및 혜택 설정</div>
              <div class="ff-grid">
                <div class="ff">
                  <label>노출 시작일 <span class="req">*</span></label>
                  <input type="text" ${isEdit ? 'value="2026-04-05 00:00"' : 'placeholder="yyyy-mm-dd hh:mm"'}>
                  <div class="hint">활성화되어 있다면 노출 시작일에 사용자에게 자동 노출됩니다</div>
                  <div style="margin-top:16px;">
                    <label>페이백 % <span class="req">*</span></label>
                    <input type="number" min="0" step="1" ${isEdit ? 'value="10"' : 'placeholder="정수값 입력"'}>
                    <div class="hint">정수값만 입력 가능합니다</div>
                  </div>
                </div>
                <div class="ff">
                  <label>노출 종료일 <span class="req">*</span></label>
                  <input type="text" ${isEdit ? 'value="2026-04-30 23:59"' : 'placeholder="yyyy-mm-dd hh:mm"'}>
                  <div class="hint">미입력 시 상시노출됩니다</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="form-footer">
          <button class="btn-back" onclick="showBenefitDashboard()">대시보드로</button>
          <button class="btn-save">${isEdit ? '수정' : '등록'}</button>
        </div>
        ${renderServiceModal()}
      `;
    }

    function showPromotionView(keepScroll = false) {
      setActiveMenu('benefit');
      render(promotionView(), keepScroll);
    }

    function showBenefitDashboard(keepScroll = false) {
      setActiveMenu('benefit');
      render(benefitDashboardView(), keepScroll);
    }

    function showBenefitRegister(isEdit = false, keepScroll = false) {
      currentBenefitRegisterIsEdit = Boolean(isEdit);
      setActiveMenu('benefit');
      render(benefitRegisterView(isEdit), keepScroll);
    }

    function setBenefitConditionMode(mode, isEdit = false) {
      benefitConditionMode = mode;
      showBenefitRegister(Boolean(isEdit), true);
    }

    function openServiceModal() {
      selectedServiceItems = appliedServiceItems.map((item) => ({ ...item }));
      serviceModalOpen = true;
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    function setRegionCity(city) {
      selectedRegionCity = city;
      syncRegionSelection();
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    function setRegionDistrict(district) {
      selectedRegionDistrict = district;
      syncRegionSelection();
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    function setRegionDong(dong) {
      selectedRegionDong = dong;
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    function addSelectedRegion() {
      syncRegionSelection();
      const areaLabel = formatRegionLabel(selectedRegionCity, selectedRegionDistrict, selectedRegionDong);
      if (!appliedRegionItems.includes(areaLabel)) {
        appliedRegionItems = [...appliedRegionItems, areaLabel];
      }
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    function removeAppliedRegion(areaLabel) {
      appliedRegionItems = appliedRegionItems.filter((item) => item !== areaLabel);
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    function closeServiceModal() {
      serviceModalOpen = false;
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    function setServiceCategory(categoryId) {
      activeServiceCategoryId = categoryId;
      const category = getActiveServiceCategory();
      activeServiceGroupId = category.groups[0].id;
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    function setServiceGroup(groupId) {
      activeServiceGroupId = groupId;
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    function toggleServiceSelection(serviceName) {
      const item = buildServiceItem(serviceName);
      if (isSelectedItem(item.key)) {
        selectedServiceItems = selectedServiceItems.filter((selectedItem) => selectedItem.key !== item.key);
      } else if (selectedServiceItems.length < 20) {
        selectedServiceItems = [...selectedServiceItems, item];
      }
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    function applySelectedServices() {
      appliedServiceItems = selectedServiceItems.map((item) => ({ ...item }));
      serviceModalOpen = false;
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    function toggleCategorySelection(categoryId) {
      const category = serviceModalCategories.find((item) => item.id === categoryId);
      if (!category) return;
      const item = buildCategoryItem(category);
      activeServiceCategoryId = categoryId;
      activeServiceGroupId = category.groups[0].id;
      if (isSelectedItem(item.key)) {
        selectedServiceItems = selectedServiceItems.filter((selectedItem) => selectedItem.key !== item.key);
      } else {
        const withoutCategoryItems = selectedServiceItems.filter((selectedItem) => selectedItem.level !== 'category1');
        if (withoutCategoryItems.length < 20) {
          selectedServiceItems = [...withoutCategoryItems, item];
        }
      }
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    function toggleGroupSelection(groupId) {
      const category = getActiveServiceCategory();
      const group = category.groups.find((item) => item.id === groupId);
      if (!group) return;
      const item = buildGroupItem(group);
      if (isSelectedItem(item.key)) {
        selectedServiceItems = selectedServiceItems.filter((selectedItem) => selectedItem.key !== item.key);
      } else if (selectedServiceItems.length < 20) {
        selectedServiceItems = [...selectedServiceItems, item];
      }
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    function removeSelectedItem(itemKey) {
      selectedServiceItems = selectedServiceItems.filter((item) => item.key !== itemKey);
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    function removeAppliedService(itemKey) {
      appliedServiceItems = appliedServiceItems.filter((item) => item.key !== itemKey);
      selectedServiceItems = selectedServiceItems.filter((item) => item.key !== itemKey);
      showBenefitRegister(currentBenefitRegisterIsEdit, true);
    }

    showPromotionView();
  </script>
</body>
</html>
