    function isSelectedItem(key) { return selectedServiceItems.some((item) => item.key === key); }
    function isDraftItem(key) { return draftServiceItem?.key === key; }
    function buildCategoryItem(category) { return { key:`category:${category.id}`, label:category.label, level:'category1' }; }
    function buildGroupItem(group) { return { key:`group:${group.id}`, label:group.label, level:'category2' }; }
    function buildServiceItem(serviceName) { return { key:`service:${serviceName}`, label:serviceName, level:'service' }; }
    function getActiveServiceCategory() { return serviceModalCategories.find((category) => category.id === activeServiceCategoryId) || serviceModalCategories[0]; }
    function getActiveServiceGroup() {
      const category = getActiveServiceCategory();
      return category.groups.find((group) => group.id === activeServiceGroupId) || category.groups[0];
    }
    function getRegionDistricts(city) { if (city === '전체') return ['전체']; return ['전체', ...Object.keys(regionOptions[city] || {})]; }
    function getRegionDongs(city, district) { if (city === '전체' || district === '전체') return ['전체']; return ['전체', ...(regionOptions[city]?.[district] || [])]; }
    function syncRegionSelection() {
      if (selectedRegionCity === '전체') { selectedRegionDistrict = '전체'; selectedRegionDong = '전체'; return; }
      const districts = getRegionDistricts(selectedRegionCity);
      if (!districts.includes(selectedRegionDistrict)) selectedRegionDistrict = districts[0];
      if (selectedRegionDistrict === '전체') { selectedRegionDong = '전체'; return; }
      const dongs = getRegionDongs(selectedRegionCity, selectedRegionDistrict);
      if (!dongs.includes(selectedRegionDong)) selectedRegionDong = dongs[0];
    }
    function formatRegionLabel(city, district, dong) {
      if (city === '전체') return '전체';
      if (district === '전체') return `${city} 전체`;
      if (dong === '전체') return `${city} ${district} 전체`;
      return `${city} ${district} ${dong}`;
    }
    function normalizeServiceSearchQuery(value) { return value.toLocaleLowerCase(); }
    function getFilteredServiceResults() {
      const normalizedQuery = normalizeServiceSearchQuery(serviceSearchQuery.trim());
      if (!normalizedQuery) return [];
      return serviceModalCategories.flatMap((category) =>
        category.groups.flatMap((group) =>
          group.services.filter((serviceName) => normalizeServiceSearchQuery(serviceName).includes(normalizedQuery)).map((serviceName) => ({
            categoryLabel: category.label,
            groupLabel: group.label,
            serviceName
          }))
        )
      );
    }
    function getServiceListMarkup() {
      const activeCategory = getActiveServiceCategory();
      const activeGroup = getActiveServiceGroup();
      const filteredServiceResults = getFilteredServiceResults();
      const isSearchingServices = Boolean(serviceSearchQuery.trim());
      return {
        title: isSearchingServices ? '검색 결과' : activeCategory.label.replace('/청소', '').replace('이사/청소', '이사'),
        subtitle: isSearchingServices ? `${filteredServiceResults.length}건` : activeGroup.label,
        rows: (isSearchingServices ? filteredServiceResults.map((result) => result.serviceName) : activeGroup.services).map((serviceName, index) => {
          const result = isSearchingServices ? filteredServiceResults[index] : null;
          return `
            <div class="service-row">
              <div class="service-row-copy">
                <span>${serviceName}</span>
                ${result ? `<div class="service-row-meta">${result.categoryLabel} > ${result.groupLabel}</div>` : ''}

              <button type="button" class="service-check ${isDraftItem(buildServiceItem(serviceName).key) ? 'checked' : ''}" onclick="selectServiceDraft('${serviceName}')"></button>
            </div>

        }).join('')

    function updateServiceSearchResults() {

      const listMarkup = getServiceListMarkup();
      titleNode.textContent = listMarkup.title;
      subtitleNode.textContent = listMarkup.subtitle;
      listNode.innerHTML = listMarkup.rows;
      addButton.classList.add('disabled');
      addButton.removeAttribute('onclick');
    }

                        <select onchange="setRegionCity(this.value)">${['전체', ...Object.keys(regionOptions)].map((city) => `<option value="${city}" ${city === selectedRegionCity ? 'selected' : ''}>${city}</option>`).join('')}</select>
                        <select onchange="setRegionDistrict(this.value)">${getRegionDistricts(selectedRegionCity).map((district) => `<option value="${district}" ${district === selectedRegionDistrict ? 'selected' : ''}>${district}</option>`).join('')}</select>
                        <select onchange="setRegionDong(this.value)">${getRegionDongs(selectedRegionCity, selectedRegionDistrict).map((dong) => `<option value="${dong}" ${dong === selectedRegionDong ? 'selected' : ''}>${dong}</option>`).join('')}</select>
                      </div>
                      <button type="button" class="area-add-btn" onclick="addSelectedRegion()">지역 추가</button>
                      ${appliedRegionItems.length ? `<div class="selected-service-stack">${appliedRegionItems.map((areaLabel) => `<div class="selected-service-card"><span>${areaLabel}</span><button type="button" class="selected-service-remove" onclick="removeAppliedRegion('${areaLabel}')">×</button></div>`).join('')}</div>` : `<div class="selected-service-empty">아직 추가된 지역이 없습니다.</div>`}
                    </div>
                  </div>
                  <div class="ff">
                    <label>서비스</label>
                    <button type="button" class="service-trigger" onclick="openServiceModal()">서비스 등록하기</button>
                    ${appliedServiceItems.length ? `<div class="selected-service-stack">${appliedServiceItems.map((item) => `<div class="selected-service-card"><span>${item.label}</span><button type="button" class="selected-service-remove" onclick="removeAppliedService('${item.key}')">×</button></div>`).join('')}</div>` : `<div class="selected-service-empty">아직 추가된 서비스가 없습니다.</div>`}
                  </div>
                </div>
              `}
            </div>
            <div class="form-card">
              <div class="form-card-title">노출 및 혜택 설정</div>
              <div class="ff-grid">
                <div class="ff">
                  <label>노출 시작일 <span class="req">*</span></label>
                  <input type="text" ${isEdit ? 'value="2026-04-05 00:00"' : 'placeholder="yyyy-mm-dd hh:mm"'}>
                  <div class="hint">활성화되어 있다면 노출 시작일에 사용자에게 자동 노출됩니다</div>
                </div>
                <div class="ff">
                  <label>노출 종료일 <span class="req">*</span></label>
                  <input type="text" ${isEdit ? 'value="2026-04-30 23:59"' : 'placeholder="yyyy-mm-dd hh:mm"'}>
                  <div class="hint">미입력 시 상시노출됩니다</div>
                </div>
                <div class="ff">
                  <label>페이백 % <span class="req">*</span></label>
                  <input type="number" min="0" step="1" ${isEdit ? 'value="10"' : 'placeholder="정수값 입력"'}>
                  <div class="hint">정수값만 입력 가능합니다</div>
                </div>
                <div class="ff">
                  <label>견적 유형</label>
                  <select><option>전체</option><option selected>스마트견적</option><option>일반견적</option></select>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="form-footer"><button class="btn-back" onclick="showBenefitDashboard()">대시보드로</button><button class="btn-save">${isEdit ? '수정' : '등록'}</button></div>
        ${renderServiceModal()}
      `;
    }

    function showPromotionView(keepScroll = false) { setActiveMenu('benefit'); render(promotionView(), keepScroll); }
    function showBenefitDashboard(keepScroll = false) { setActiveMenu('benefit'); render(promotionView(), keepScroll); }
    function showBenefitRegister(isEdit = false, keepScroll = false) { currentBenefitRegisterIsEdit = Boolean(isEdit); setActiveMenu('benefit'); render(benefitRegisterView(isEdit), keepScroll); }
    function setBenefitConditionMode(mode, isEdit = false) { benefitConditionMode = mode; showBenefitRegister(Boolean(isEdit), true); }
    function openServiceModal() { selectedServiceItems = appliedServiceItems.map((item) => ({ ...item })); serviceSearchQuery = ''; draftServiceItem = null; serviceModalOpen = true; showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function setRegionCity(city) { selectedRegionCity = city; syncRegionSelection(); showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function setRegionDistrict(district) { selectedRegionDistrict = district; syncRegionSelection(); showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function setRegionDong(dong) { selectedRegionDong = dong; showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function addSelectedRegion() { syncRegionSelection(); const areaLabel = formatRegionLabel(selectedRegionCity, selectedRegionDistrict, selectedRegionDong); if (!appliedRegionItems.includes(areaLabel)) appliedRegionItems = [...appliedRegionItems, areaLabel]; showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function removeAppliedRegion(areaLabel) { appliedRegionItems = appliedRegionItems.filter((item) => item !== areaLabel); showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function closeServiceModal() { serviceModalOpen = false; showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function setServiceCategory(categoryId) { activeServiceCategoryId = categoryId; const category = getActiveServiceCategory(); activeServiceGroupId = category.groups[0].id; showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function setServiceGroup(groupId) { activeServiceGroupId = groupId; showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function startServiceSearchComposition() { isServiceSearchComposing = true; }
    function endServiceSearchComposition(value) { isServiceSearchComposing = false; serviceSearchQuery = value; draftServiceItem = null; updateServiceSearchResults(); }
    function setServiceSearchQuery(value) { if (isServiceSearchComposing) { serviceSearchQuery = value; return; } serviceSearchQuery = value; draftServiceItem = null; updateServiceSearchResults(); }
    function selectServiceDraft(serviceName) { draftServiceItem = buildServiceItem(serviceName); showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function addDraftServiceItem() { if (!draftServiceItem) return; if (!isSelectedItem(draftServiceItem.key) && selectedServiceItems.length < 20) selectedServiceItems = [...selectedServiceItems, { ...draftServiceItem }]; showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function applySelectedServices() { appliedServiceItems = selectedServiceItems.map((item) => ({ ...item })); serviceModalOpen = false; showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function selectCategoryDraft(categoryId) { const category = serviceModalCategories.find((item) => item.id === categoryId); if (!category) return; activeServiceCategoryId = categoryId; activeServiceGroupId = category.groups[0].id; draftServiceItem = buildCategoryItem(category); showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function selectGroupDraft(groupId) { const category = getActiveServiceCategory(); const group = category.groups.find((item) => item.id === groupId); if (!group) return; draftServiceItem = buildGroupItem(group); showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function removeSelectedItem(itemKey) { selectedServiceItems = selectedServiceItems.filter((item) => item.key !== itemKey); if (draftServiceItem?.key === itemKey) draftServiceItem = null; showBenefitRegister(currentBenefitRegisterIsEdit, true); }
    function removeAppliedService(itemKey) { appliedServiceItems = appliedServiceItems.filter((item) => item.key !== itemKey); selectedServiceItems = selectedServiceItems.filter((item) => item.key !== itemKey); showBenefitRegister(currentBenefitRegisterIsEdit, true); }

    showPromotionView();
  </script>
</body>
</html>
